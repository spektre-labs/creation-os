name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  c11-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Structural build and tests
        run: make check && make check-v6 && make check-v7 && make check-v9 && make check-v10 && make check-v11
