name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: creation-os-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  c11-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Merge gate (portable + v6..v26 self-tests)
        run: make merge-gate
