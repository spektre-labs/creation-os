# SPDX-License-Identifier: AGPL-3.0-or-later
name: CI

concurrency:
  group: creation-os-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  c11-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Verilator and Yosys (RTL gate)
        run: sudo apt-get update -qq && sudo apt-get install -qq -y verilator yosys

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Merge gate + stack-ultimate + Rust iron lint
        run: make merge-gate && make stack-ultimate && make rust-iron-lint

  oss-cad-formal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: YosysHQ/setup-oss-cad-suite@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: OSS formal extreme (SBY prove+cover, Yosys SAT, EQY, Rust iron lint)
        run: |
          set -e
          yosys --version
          sby --version
          command -v eqy && eqy --version || true
          make oss-formal-extreme

  c11-asan-ubsan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang
        run: sudo apt-get update -qq && sudo apt-get install -qq -y clang

      - name: ASan + UBSan make check
        env:
          CC: clang
          CFLAGS: -O1 -g -std=c11 -Wall -fsanitize=address,undefined -fno-omit-frame-pointer -fno-sanitize-recover=all -march=native -D_POSIX_C_SOURCE=200809L
          LDFLAGS: -lm -fsanitize=address,undefined
        run: make clean && make check
