# SPDX-License-Identifier: AGPL-3.0-or-later
# Primary CI: fast smoke + full merge-gate (no Ollama; no model download).
# Heavy stack / formal / ASan jobs live in ci-stack.yml (manual + weekly).
name: Creation OS CI

concurrency:
  group: creation-os-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Install C build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential libsqlite3-dev libcurl4-openssl-dev

      - name: Build cos + cos-demo
        run: |
          make cos cos-demo
          echo "BUILD OK"

      - name: cos demo --batch
        run: |
          ./cos demo --batch
          echo "DEMO OK"

      - name: cos help
        run: |
          ./cos help
          echo "HELP OK"

      - name: make check-agi
        run: |
          make check-agi
          echo "AGI CHECKS OK"

      - name: make check-inference-cache
        run: make check-inference-cache

      - name: make check-speculative-sigma
        run: make check-speculative-sigma

      - name: make check-omega
        run: make check-omega

      - name: make check-energy-accounting
        run: make check-energy-accounting

      - name: make check-green-score
        run: make check-green-score

  merge-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: build-and-test

    steps:
      - uses: actions/checkout@v6

      - name: Install C build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential libsqlite3-dev libcurl4-openssl-dev

      - name: make merge-gate
        run: |
          make merge-gate
          echo "MERGE GATE PASS"
