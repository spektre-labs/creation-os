<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" role="img" aria-labelledby="title desc">
  <title id="title">Spektre Labs</title>
  <desc id="desc">Monochrome luxury wordmark — white on black. Use README JPEG for GitHub; this is a vector twin.</desc>
  <rect width="800" height="280" fill="#000000"/>
  <style>
    .brand {
      font-family: ui-serif, "Times New Roman", Times, "Liberation Serif", serif;
      font-size: 56px;
      font-weight: 600;
      fill: #ffffff;
      letter-spacing: 0.34em;
      text-anchor: middle;
      dominant-baseline: middle;
    }
    .sub {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 13px;
      font-weight: 500;
      fill: #ffffff;
      letter-spacing: 0.82em;
      text-anchor: middle;
      dominant-baseline: middle;
    }
    .loc {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 11px;
      font-weight: 500;
      fill: #a3a3a3;
      letter-spacing: 0.5em;
      text-anchor: middle;
      dominant-baseline: middle;
    }
  </style>
  <text x="400" y="118" class="brand">SPEKTRE</text>
  <text x="400" y="172" class="sub">LABS</text>
  <text x="400" y="238" class="loc">HELSINKI · 2026</text>
</svg>
