<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="338" viewBox="0 0 960 338" role="img" aria-labelledby="title desc">
  <title id="title">Spektre Labs, Helsinki 2026</title>
