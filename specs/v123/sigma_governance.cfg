\* v123 σ-Formal — TLC configuration.
\*
\* Keep the state space small enough that a laptop TLC can exhaust it
\* in seconds.  TauSafety=6 matches the runtime τ_safety=0.60 used by
\* v106/v122; TauCode=4 matches the tighter sandbox τ_code=0.40 used
\* by v113.
SPECIFICATION Spec

CONSTANTS
    TauSafety   = 6
    TauCode     = 4
    MaxMemSteps = 3
    NSpec       = 3

INVARIANTS
    TypeOK
    AbstainSafety
    EmitCoherence
    MemoryMonotonicity
    SwarmConsensus
    NoSilentFailure
    ToolSafety
