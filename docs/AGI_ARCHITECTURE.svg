<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" role="img"
     aria-label="Creation OS six-layer sigma stack: silicon, generation, sigma-governance, reasoning, training, distribution">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1115"/>
      <stop offset="100%" stop-color="#1b1f27"/>
    </linearGradient>
    <filter id="softshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow-down" viewBox="0 0 10 10" refX="5" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f1c40f"/>
    </marker>
    <marker id="arrow-up" viewBox="0 0 10 10" refX="5" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3498db"/>
    </marker>
    <style><![CDATA[
      .layer     { fill: #2e3543; stroke: #7f8fa6; stroke-width: 1.2; rx: 10; ry: 10; }
      .layer-hi  { fill: #35506b; stroke: #7fb7e0; stroke-width: 1.4; rx: 10; ry: 10; }
      .layer-win { fill: #355243; stroke: #78c488; stroke-width: 1.4; rx: 10; ry: 10; }
      .title     { font-family: ui-sans-serif, -apple-system, "Segoe UI", sans-serif;
                   fill: #f0f2f5; font-weight: 600; font-size: 17px; }
      .sub       { font-family: ui-monospace, Menlo, monospace;
                   fill: #a9b4c2; font-size: 12px; }
      .win       { font-family: ui-monospace, Menlo, monospace;
                   fill: #c5e3d0; font-size: 12px; }
      .head      { font-family: ui-sans-serif, -apple-system, "Segoe UI", sans-serif;
                   fill: #ffffff; font-weight: 700; font-size: 20px; }
      .small     { font-family: ui-sans-serif, -apple-system, "Segoe UI", sans-serif;
                   fill: #8892a0; font-size: 11px; }
      .lbl-inf   { font-family: ui-sans-serif, -apple-system, "Segoe UI", sans-serif;
                   fill: #f1c40f; font-size: 12px; font-weight: 600; }
      .lbl-trn   { font-family: ui-sans-serif, -apple-system, "Segoe UI", sans-serif;
                   fill: #3498db; font-size: 12px; font-weight: 600; }
      .arr-inf   { stroke: #f1c40f; stroke-width: 2; fill: none; }
      .arr-trn   { stroke: #3498db; stroke-width: 2; fill: none; stroke-dasharray: 5 3; }
    ]]></style>
  </defs>

  <rect x="0" y="0" width="980" height="620" fill="url(#bg)"/>

  <text class="head" x="28"  y="38">Creation OS  six-layer Ă-stack</text>
  <text class="small" x="28" y="58">silicon ¸ generation ¸ Ă-governance ¸ reasoning ¸ training ¸ distribution</text>

  <!-- layer rects -->
  <g filter="url(#softshadow)">
    <rect class="layer"     x="60"  y="90"  width="860" height="68"/>
    <rect class="layer"     x="60"  y="170" width="860" height="68"/>
    <rect class="layer-win" x="60"  y="250" width="860" height="68"/>
    <rect class="layer-hi"  x="60"  y="330" width="860" height="68"/>
    <rect class="layer-hi"  x="60"  y="410" width="860" height="68"/>
    <rect class="layer-hi"  x="60"  y="490" width="860" height="68"/>
  </g>

  <!-- layer 1 silicon -->
  <text class="title" x="80"  y="117">1. Silicon    bit-serial HDC RTL + formal equivalence</text>
  <text class="sub"   x="80"  y="140">rtl/bind_xor.sv · rtl/bundle_majority.sv · hw/formal/*.sby · yosys-elab</text>
  <text class="small" x="900" y="140" text-anchor="end">claim layer  Lab-demo in C today</text>

  <!-- layer 2 generation -->
  <text class="title" x="80"  y="197">2. Generation    BitNet 1.58-bit bridge (v101)</text>
  <text class="sub"   x="80"  y="220">src/v101/bridge.h · sigma_channels.c · cos_v101_bridge_generate() · 8 Ă-channels/token</text>
  <text class="small" x="900" y="220" text-anchor="end">real mode via bitnet.cpp</text>

  <!-- layer 3 sigma gov  -->
  <text class="title" x="80"  y="277">3. Ă-Governance    Ä-sweep, operator search, frontier matrix (v103/v104/v111.1)</text>
  <text class="win"   x="80"  y="300">benchmarks/v111/frontier_matrix.py · 4 tasks × 6 signals · Bonferroni 24 ·  sigma_max_token p=0.002 </text>
  <text class="small" x="900" y="300" text-anchor="end">default = sigma_product (v105)</text>

  <!-- layer 4 reasoning -->
  <text class="title" x="80"  y="357">4. Reasoning    v62 EBM · v64 MCTS · v45 introspection · v111.2 Ă-Reason</text>
  <text class="sub"   x="80"  y="380">src/v111/reason.c · POST /v1/reason · k-candidate Ă-ranking · waypoint-match check · abstain</text>
  <text class="small" x="900" y="380" text-anchor="end">composes, never adds weights</text>

  <!-- layer 5 training -->
  <text class="title" x="80"  y="437">5. Training    Ă-supervised SFT / LoRA (v111.3)</text>
  <text class="sub"   x="80"  y="460">training/v111/extract_sigma_training_data.py · train_sigma_abstain.py (MLX · TinyLlama / Phi-2)</text>
  <text class="small" x="900" y="460" text-anchor="end">Ă-self-distillation · IDK / answer</text>

  <!-- layer 6 distribution -->
  <text class="title" x="80"  y="517">6. Distribution    HTTP server · installer · web UI (v106 / v107 / v108 / v109 / v110)</text>
  <text class="sub"   x="80"  y="540">src/v106/server.c · packaging/install.sh · packaging/homebrew/cos.rb · Dockerfile · web/index.html</text>
  <text class="small" x="900" y="540" text-anchor="end">one command · any GGUF · Ă-UI</text>

  <!-- arrows right side: inference DOWN (yellow) training UP (blue) -->
  <g>
    <text class="lbl-inf" x="860" y="83">inference</text>
    <text class="lbl-trn" x="928" y="83">feedback</text>

    <!-- inference arrows down between layers -->
    <path class="arr-inf" d="M880,158 L880,170" marker-end="url(#arrow-down)"/>
    <path class="arr-inf" d="M880,238 L880,250" marker-end="url(#arrow-down)"/>
    <path class="arr-inf" d="M880,318 L880,330" marker-end="url(#arrow-down)"/>
    <path class="arr-inf" d="M880,398 L880,410" marker-end="url(#arrow-down)"/>
    <path class="arr-inf" d="M880,478 L880,490" marker-end="url(#arrow-down)"/>

    <!-- training arrows up from layer 3 to layer 5, then 5 to 2 -->
    <path class="arr-trn" d="M940,250 L940,178" marker-end="url(#arrow-up)"/>
    <text class="small" x="958" y="222" text-anchor="start">Ă labels</text>
    <path class="arr-trn" d="M940,330 L940,410" marker-end="url(#arrow-up)"/>
    <text class="small" x="958" y="380" text-anchor="start">adapter</text>
  </g>

  <!-- bottom note -->
  <text class="small" x="28" y="588">inference flow (yellow Ľ): prompt ’ server ’ /v1/reason ’ bridge ’ Ă profile ’ {text, Ă_product, abstained}</text>
  <text class="small" x="28" y="604">training feedback (blue ˛ dashed): v104 sidecars ’ label extraction ’ MLX LoRA ’ adapter ’ next-gen v101 bridge</text>
</svg>
