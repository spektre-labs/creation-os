<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" role="img" aria-labelledby="kt kd">
  <title id="kt">Portable proof vs standalone lab demos</title>
  <desc id="kd">creation_os_v2 with test and bench versus creation_os_v6 through v11 self_test only lab demo class C.</desc>
  <defs>
    <linearGradient id="bgk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <filter id="fk" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
    <linearGradient id="accProof" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="accLab" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" style="stop-color:#ea580c"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bgk)"/>
  <rect x="0" y="0" width="960" height="4" fill="#0f172a"/>
  <text x="480" y="40" text-anchor="middle" fill="#0f172a" font-family="ui-sans-serif,system-ui,sans-serif" font-size="17" font-weight="800">Kernel lineage / evidence class</text>
  <text x="480" y="62" text-anchor="middle" fill="#64748b" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="500">Doctoral read path  do not merge columns in one headline claim</text>
  <rect x="40" y="88" width="400" height="200" rx="14" fill="#fff" stroke="#059669" stroke-width="2.5" filter="url(#fk)"/>
  <rect x="40" y="88" width="400" height="36" rx="14" fill="url(#accProof)"/>
  <text x="240" y="112" text-anchor="middle" fill="#fff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="800" letter-spacing="0.04em">PORTABLE PROOF</text>
  <text x="240" y="148" text-anchor="middle" fill="#0f172a" font-family="ui-monospace,monospace" font-size="13" font-weight="700">creation_os_v2.c</text>
  <text x="240" y="172" text-anchor="middle" fill="#475569" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">Invariant / arithmetic / measured</text>
  <text x="240" y="194" text-anchor="middle" fill="#64748b" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10">make test / make bench / MODULE_EVIDENCE_INDEX</text>
  <text x="240" y="222" text-anchor="middle" fill="#334155" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="600">4096-bit BSC reference in one file</text>
  <text x="240" y="258" text-anchor="middle" fill="#059669" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700">Thesis body material (with limits)</text>
  <rect x="520" y="88" width="400" height="200" rx="14" fill="#fff" stroke="#ea580c" stroke-width="2.5" filter="url(#fk)"/>
  <rect x="520" y="88" width="400" height="36" rx="14" fill="url(#accLab)"/>
  <text x="720" y="112" text-anchor="middle" fill="#fff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="800" letter-spacing="0.04em">STANDALONE LAB DEMOS</text>
  <text x="720" y="148" text-anchor="middle" fill="#0f172a" font-family="ui-monospace,monospace" font-size="11" font-weight="700">v6 / v7 / v9 / v10 / v11 / v12</text>
  <text x="720" y="170" text-anchor="middle" fill="#475569" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">Lab demo (C) only</text>
  <text x="720" y="192" text-anchor="middle" fill="#64748b" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10">make check-v6 ... check-v11 / self_test</text>
  <text x="720" y="214" text-anchor="middle" fill="#334155" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="600">Narrative sigma scaffolds / M01-M37</text>
  <text x="720" y="236" text-anchor="middle" fill="#64748b" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9">1024-bit pack in v6 line / not harness or tape-out</text>
  <text x="720" y="258" text-anchor="middle" fill="#c2410c" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700">Appendix-only unless walled</text>
  <text x="480" y="310" text-anchor="middle" fill="#64748b" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10">CLAIM_DISCIPLINE forbidden merges 5-6 / RESEARCH_AND_THESIS_ARCHITECTURE section 0</text>
  <text x="480" y="328" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9">Spektre Labs / Creation OS / docs/assets/kernel-lineage-evidence.svg</text>
</svg>
