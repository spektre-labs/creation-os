  <rect x="32" y="56" width="250" height="112" rx="10" fill="#fff" stroke="#a855f7" stroke-width="2"/>
  <text x="157" y="92" text-anchor="middle" fill="#6b21a8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700">Plane A</text>
