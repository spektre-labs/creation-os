<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" role="img" aria-labelledby="el-t el-d">
  <title id="el-t">Evidence class ladder</title>
  <desc id="el-d">Arithmetic, measured, harness sequence plus adjacent lab-demo bus. Flight-ops style diagram; original artwork.</desc>
  <defs>
    <linearGradient id="el-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="el-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <pattern id="el-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#38bdf8" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <filter id="el-sh" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="820" height="300" fill="url(#el-bg)"/>
  <rect width="820" height="300" fill="url(#el-grid)"/>
  <rect x="0" y="0" width="820" height="4" fill="url(#el-accent)"/>
  <text x="24" y="26" fill="#64748b" font-family="ui-monospace,Menlo,monospace" font-size="9" font-weight="600" letter-spacing="0.12em">FIG 03 / EVIDENCE LADDER</text>
  <text x="410" y="52" text-anchor="middle" fill="#f1f5f9" font-family="ui-sans-serif,system-ui,sans-serif" font-size="17" font-weight="800">Evidence ladder</text>
  <text x="410" y="72" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="500">One headline number / one evidence class (CLAIM_DISCIPLINE)</text>
  <text x="150" y="98" text-anchor="middle" fill="#22d3ee" font-family="ui-monospace,Menlo,monospace" font-size="9" font-weight="700">L1</text>
  <rect x="36" y="104" width="228" height="72" rx="10" fill="#164e63" stroke="#22d3ee" stroke-width="1.5" filter="url(#el-sh)"/>
  <text x="150" y="138" text-anchor="middle" fill="#ecfeff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="800">Arithmetic</text>
  <text x="150" y="158" text-anchor="middle" fill="#99f6e4" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10">ops and RAM from D, dtype</text>
  <text x="410" y="98" text-anchor="middle" fill="#38bdf8" font-family="ui-monospace,Menlo,monospace" font-size="9" font-weight="700">L2</text>
  <rect x="296" y="104" width="228" height="72" rx="10" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5" filter="url(#el-sh)"/>
  <text x="410" y="138" text-anchor="middle" fill="#f0f9ff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="800">Measured</text>
  <text x="410" y="158" text-anchor="middle" fill="#bae6fd" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10">make bench + archived host</text>
  <text x="670" y="98" text-anchor="middle" fill="#a5b4fc" font-family="ui-monospace,Menlo,monospace" font-size="9" font-weight="700">L3</text>
  <rect x="556" y="104" width="228" height="72" rx="10" fill="#312e81" stroke="#a5b4fc" stroke-width="1.5" filter="url(#el-sh)"/>
  <text x="670" y="138" text-anchor="middle" fill="#eef2ff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="800">Harness</text>
  <text x="670" y="158" text-anchor="middle" fill="#c7d2fe" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10">lm-eval JSON + SHA + model id</text>
  <path d="M264 140 L294 140 M524 140 L554 140" stroke="url(#el-accent)" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="294,134 306,140 294,146" fill="#38bdf8"/>
  <polygon points="554,134 566,140 554,146" fill="#a5b4fc"/>
  <text x="410" y="188" text-anchor="middle" fill="#f97316" font-family="ui-monospace,Menlo,monospace" font-size="9" font-weight="700">ADJ BUS / NOT ON LADDER</text>
  <rect x="100" y="196" width="620" height="56" rx="10" fill="#1e293b" stroke="#f97316" stroke-width="1.5" filter="url(#el-sh)"/>
  <text x="410" y="222" text-anchor="middle" fill="#fed7aa" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="600">Lab demo (C) + verified invariants / beside harness rows, never blended in one headline</text>
  <text x="410" y="240" text-anchor="middle" fill="#fdba74" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10">Never mix microbench with MMLU in one sentence</text>
  <rect x="0" y="264" width="820" height="36" fill="#020617"/>
  <line x1="0" y1="264" x2="820" y2="264" stroke="#334155" stroke-width="1"/>
  <text x="24" y="286" fill="#475569" font-family="ui-monospace,Menlo,monospace" font-size="9">REF=docs/CLAIM_DISCIPLINE.md | SPEKTRE LABS | CREATION OS</text>
  <text x="796" y="286" text-anchor="end" fill="#22d3ee" font-family="ui-monospace,Menlo,monospace" font-size="9" font-weight="600">FIG 03 LOCKED</text>
</svg>
