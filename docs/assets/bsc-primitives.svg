<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 296" role="img" aria-labelledby="bp-t bp-d">
  <title id="bp-t">BSC three primitives</title>
  <desc id="bp-d">XOR, MAJ, POPCNT signal chain to sigma readout. Teaching schematic; original artwork.</desc>
  <defs>
    <linearGradient id="bp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <pattern id="bp-grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#94a3b8" stroke-opacity="0.2" stroke-width="0.75"/>
    </pattern>
    <filter id="bp-card" x="-6%" y="-6%" width="112%" height="112%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="bp-arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="900" height="296" fill="url(#bp-bg)"/>
  <rect width="900" height="296" fill="url(#bp-grid)"/>
  <rect x="0" y="0" width="900" height="3" fill="#0f172a" opacity="0.85"/>
  <text x="20" y="26" fill="#64748b" font-family="ui-monospace,Menlo,monospace" font-size="9" font-weight="600" letter-spacing="0.1em">FIG 06 / BSC PRIMITIVES</text>
  <text x="450" y="52" text-anchor="middle" fill="#0f172a" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" font-weight="800">Binary Spatter Codes</text>
  <text x="450" y="72" text-anchor="middle" fill="#64748b" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="500">Three operations / one coherence readout</text>
  <rect x="36" y="92" width="248" height="128" rx="14" fill="#fff" stroke="#2563eb" stroke-width="2" filter="url(#bp-card)"/>
  <text x="160" y="128" text-anchor="middle" fill="#1d4ed8" font-family="ui-monospace,Menlo,monospace" font-size="11" font-weight="700">STAGE 01</text>
  <text x="160" y="152" text-anchor="middle" fill="#1d4ed8" font-family="ui-monospace,Menlo,monospace" font-size="24" font-weight="800">XOR</text>
  <text x="160" y="178" text-anchor="middle" fill="#475569" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="600">bind / associate</text>
  <text x="160" y="200" text-anchor="middle" fill="#64748b" font-family="ui-monospace,Menlo,monospace" font-size="11">a[i] ^ b[i]</text>
  <rect x="326" y="92" width="248" height="128" rx="14" fill="#fff" stroke="#7c3aed" stroke-width="2" filter="url(#bp-card)"/>
  <text x="450" y="128" text-anchor="middle" fill="#5b21b6" font-family="ui-monospace,Menlo,monospace" font-size="11" font-weight="700">STAGE 02</text>
  <text x="450" y="152" text-anchor="middle" fill="#5b21b6" font-family="ui-monospace,Menlo,monospace" font-size="24" font-weight="800">MAJ</text>
  <text x="450" y="178" text-anchor="middle" fill="#475569" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="600">bundle / superpose</text>
  <text x="450" y="200" text-anchor="middle" fill="#64748b" font-family="ui-monospace,Menlo,monospace" font-size="11">majority of bits</text>
  <rect x="616" y="92" width="248" height="128" rx="14" fill="#fff" stroke="#059669" stroke-width="2" filter="url(#bp-card)"/>
  <text x="740" y="124" text-anchor="middle" fill="#047857" font-family="ui-monospace,Menlo,monospace" font-size="11" font-weight="700">STAGE 03</text>
  <text x="740" y="148" text-anchor="middle" fill="#047857" font-family="ui-monospace,Menlo,monospace" font-size="20" font-weight="800">POPCNT</text>
  <text x="740" y="174" text-anchor="middle" fill="#475569" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="600">Hamming mass</text>
  <text x="740" y="196" text-anchor="middle" fill="#64748b" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">sigma squared norm</text>
  <text x="740" y="214" text-anchor="middle" fill="#64748b" font-family="ui-monospace,Menlo,monospace" font-size="10">D = 4096 in v2</text>
  <line x1="284" y1="156" x2="322" y2="156" stroke="#64748b" stroke-width="3" stroke-linecap="round" marker-end="url(#bp-arr)"/>
  <line x1="574" y1="156" x2="612" y2="156" stroke="#64748b" stroke-width="3" stroke-linecap="round" marker-end="url(#bp-arr)"/>
  <rect x="120" y="232" width="660" height="36" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1" filter="url(#bp-card)"/>
  <text x="450" y="256" text-anchor="middle" fill="#334155" font-family="ui-monospace,Menlo,monospace" font-size="12" font-weight="600">sigma(a,b) = ( Hamming(a,b) / D )^2</text>
  <rect x="0" y="276" width="900" height="20" fill="#0f172a"/>
  <text x="20" y="290" fill="#94a3b8" font-family="ui-monospace,Menlo,monospace" font-size="8">README-ALIGNED DEFINITION | SPEKTRE LABS | FIG 06</text>
</svg>
