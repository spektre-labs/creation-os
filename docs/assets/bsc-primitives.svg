<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 262" role="img" aria-labelledby="t d">
  <title id="t">BSC three primitives</title>
  <desc id="d">XOR binding, MAJ bundling, POPCNT coherence leading to sigma readout.</desc>
  <defs>
    <linearGradient id="bgLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <filter id="card" x="-6%" y="-6%" width="112%" height="112%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="url(#bgLight)"/>
  <rect x="0" y="0" width="900" height="2" fill="#0f172a" opacity="0.12"/>
  <text x="450" y="36" text-anchor="middle" fill="#0f172a" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" font-weight="800">Binary Spatter Codes</text>
  <text x="450" y="56" text-anchor="middle" fill="#64748b" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="500">Three operations ť one coherence readout</text>
  <rect x="36" y="76" width="248" height="128" rx="14" fill="#fff" stroke="#2563eb" stroke-width="2" filter="url(#card)"/>
  <text x="160" y="118" text-anchor="middle" fill="#1d4ed8" font-family="ui-monospace,ui-sans-serif,monospace" font-size="24" font-weight="800">XOR</text>
  <text x="160" y="144" text-anchor="middle" fill="#475569" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="600">bind / associate</text>
  <text x="160" y="172" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="11">a[i] ^ b[i]</text>
  <rect x="326" y="76" width="248" height="128" rx="14" fill="#fff" stroke="#7c3aed" stroke-width="2" filter="url(#card)"/>
  <text x="450" y="118" text-anchor="middle" fill="#5b21b6" font-family="ui-monospace,ui-sans-serif,monospace" font-size="24" font-weight="800">MAJ</text>
  <text x="450" y="144" text-anchor="middle" fill="#475569" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="600">bundle / superpose</text>
  <text x="450" y="172" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="11">majority of bits</text>
  <rect x="616" y="76" width="248" height="128" rx="14" fill="#fff" stroke="#059669" stroke-width="2" filter="url(#card)"/>
  <text x="740" y="114" text-anchor="middle" fill="#047857" font-family="ui-monospace,ui-sans-serif,monospace" font-size="20" font-weight="800">POPCNT</text>
  <text x="740" y="140" text-anchor="middle" fill="#475569" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="600">Hamming mass</text>
  <text x="740" y="164" text-anchor="middle" fill="#64748b" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">sigma squared norm</text>
  <text x="740" y="186" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="10">D = 4096 in v2</text>
  <line x1="284" y1="140" x2="322" y2="140" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" marker-end="url(#arr)"/>
  <line x1="574" y1="140" x2="612" y2="140" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" marker-end="url(#arr)"/>
  <rect x="120" y="212" width="660" height="32" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1" filter="url(#card)"/>
  <text x="450" y="232" text-anchor="middle" fill="#334155" font-family="ui-monospace,monospace" font-size="12" font-weight="600">sigma(a,b) = ( Hamming(a,b) / D )^2</text>
  <text x="450" y="254" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9">Spektre Labs / Creation OS / README-aligned definition</text>
</svg>
