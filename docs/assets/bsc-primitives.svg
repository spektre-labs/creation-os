<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 200" role="img" aria-labelledby="t d">
  <title id="t">BSC three primitives</title>
  <desc id="d">XOR binding, MAJ bundling, POPCNT coherence.</desc>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f1f5f9"/>
  <text x="440" y="32" text-anchor="middle" fill="#0f172a" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15" font-weight="700">Binary Spatter Codes — three operations</text>
  <rect x="40" y="56" width="240" height="120" rx="12" fill="#fff" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="160" y="95" text-anchor="middle" fill="#1e40af" font-family="ui-monospace,monospace" font-size="22" font-weight="700">XOR</text>
  <text x="160" y="122" text-anchor="middle" fill="#475569" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">bind / associate</text>
  <text x="160" y="148" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="10">a[i] ^ b[i]</text>
  <rect x="320" y="56" width="240" height="120" rx="12" fill="#fff" stroke="#8b5cf6" stroke-width="2.5"/>
  <text x="440" y="95" text-anchor="middle" fill="#5b21b6" font-family="ui-monospace,monospace" font-size="22" font-weight="700">MAJ</text>
  <text x="440" y="122" text-anchor="middle" fill="#475569" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">bundle / superpose</text>
  <text x="440" y="148" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="10">majority of bits</text>
  <rect x="600" y="56" width="240" height="120" rx="12" fill="#fff" stroke="#059669" stroke-width="2.5"/>
  <text x="720" y="95" text-anchor="middle" fill="#047857" font-family="ui-monospace,monospace" font-size="18" font-weight="700">POPCNT</text>
  <text x="720" y="118" text-anchor="middle" fill="#475569" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">coherence ?</text>
  <text x="720" y="148" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="10">Hamming to sigma squared</text>
  <line x1="280" y1="116" x2="318" y2="116" stroke="#94a3b8" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="560" y1="116" x2="598" y2="116" stroke="#94a3b8" stroke-width="3" marker-end="url(#arr)"/>
</svg>
