<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-labelledby="t d">
  <title id="t">GEMM vs BSC / memory and op proxy (D=4096)</title>
  <desc id="d">Illustrative bars: 32x memory ratio, 192x op proxy from README definitions.</desc>
  <rect width="100%" height="100%" fill="#fafafa"/>
  <text x="360" y="36" text-anchor="middle" fill="#111" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" font-weight="700">Same task shape (D = 4096) / structural ratios</text>
  <text x="360" y="58" text-anchor="middle" fill="#64748b" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">From encodings in README / run make bench for host throughput</text>
  <text x="24" y="110" fill="#334155" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600">Memory / vector</text>
  <rect x="180" y="88" width="480" height="36" rx="4" fill="#e2e8f0"/>
  <rect x="180" y="88" width="480" height="36" rx="4" fill="#3b82f6" opacity="0.88"/>
  <text x="420" y="112" text-anchor="middle" fill="#fff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="600">GEMM float32 / 16 KiB (reference width)</text>
  <rect x="180" y="132" width="15" height="36" rx="4" fill="#10b981"/>
  <text x="210" y="156" fill="#065f46" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="700">BSC 512 B</text>
  <text x="520" y="156" fill="#0f172a" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">32x less memory per pattern (ratio)</text>
  <text x="24" y="218" fill="#334155" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600">Op proxy / trial</text>
  <rect x="180" y="196" width="480" height="36" rx="4" fill="#e2e8f0"/>
  <rect x="180" y="196" width="480" height="36" rx="4" fill="#6366f1" opacity="0.9"/>
  <text x="420" y="220" text-anchor="middle" fill="#fff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="600">GEMM cosine proxy / 24,576 FLOPs (reference width)</text>
  <rect x="180" y="240" width="4" height="36" rx="2" fill="#f59e0b"/>
  <text x="200" y="264" fill="#92400e" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="700">BSC 128 bit-ops</text>
  <text x="460" y="264" fill="#0f172a" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">192x fewer op-proxy count (README table)</text>
  <text x="360" y="292" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10">Spektre Labs / bar widths proportional to ratio (schematic)</text>
</svg>
